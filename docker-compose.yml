services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: oeis
      POSTGRES_USER: oeis
      POSTGRES_PASSWORD: oeis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oeis -d oeis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
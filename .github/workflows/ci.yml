name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: oeis
          POSTGRES_USER: oeis
          POSTGRES_PASSWORD: oeis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oeis -d oeis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://oeis:oeis@localhost:5432/oeis
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Check backend formatting
        run: ruff format --check api pyproject.toml

      - name: Lint backend
        run: ruff check api pyproject.toml

      - name: Run backend tests
        run: pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix website

      - name: Check frontend formatting
        run: npm --prefix website run format:check

      - name: Lint frontend
        run: npm --prefix website run lint

      - name: Typecheck frontend
        run: npm --prefix website run typecheck

      - name: Run frontend tests
        run: npm --prefix website run test
